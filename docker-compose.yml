version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: kognirecovery-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kognirecovery_dev
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kognirecovery-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: kognirecovery-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kognirecovery-network

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.16.0-community
    container_name: kognirecovery-neo4j
    hostname: kognirecovery-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    ports:
      - "7475:7474"  # HTTP
      - "7688:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./docker/neo4j/import:/import
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - kognirecovery-network

  # Backend API
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kognirecovery-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3003
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/kognirecovery_dev?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - JWT_SECRET=dev_jwt_secret_key_min_32_chars_for_development_only
      - JWT_REFRESH_SECRET=dev_refresh_token_secret_min_64_chars_for_development_purposes_only
      - ENCRYPTION_KEY=dev_encryption_key_32_chars_for_development
      - API_URL=http://localhost:3003
      - CORS_ORIGIN=*
    ports:
      - "3003:3003"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - kognirecovery-network

  # Frontend (Expo Web)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: kognirecovery-frontend
    restart: unless-stopped
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/server/node_modules
    ports:
      - "19006:19006"
      - "8084:8081"
    environment:
      - NODE_ENV=development
      - EXPO_PUBLIC_API_URL=http://localhost:3003
      - EXPO_DEVTOOLS_LISTEN_ADDRESS=0.0.0.0
    stdin_open: true
    tty: true
    depends_on:
      - api
    networks:
      - kognirecovery-network

  # pgAdmin (Opcional - Levantado con perfil 'tools')
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: kognirecovery-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kognirecovery.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - kognirecovery-network
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

networks:
  kognirecovery-network:
    driver: bridge