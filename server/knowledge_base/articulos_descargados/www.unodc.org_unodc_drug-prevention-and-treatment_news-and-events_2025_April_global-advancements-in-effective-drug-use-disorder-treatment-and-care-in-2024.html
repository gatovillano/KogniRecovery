         <h1 class="site-label ">Global advancements in effective drug use disorder treatment and care in 2024</h1><p><strong>April 15th 2025</strong></p></div>
   </div>
</div><div class="container mx-auto mt-0">
   <div class=" row mb-2 mt-0">
      <div class="col-lg-12">
         <div class=" island px-0 py-3 pt-lg-0 pb-lg-3 col-lg-6 float-left pl-lg-0 pr-lg-4 ">
            <div class="embed-responsive embed-responsive-16by9"><iframe class="embed-responsive-item" src="https://www.youtube.com/embed/b4IGVsiaKNw?controls=0" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" frameborder="0" allowfullscreen="true"></iframe></div>
         </div><div style="text-align: justify;">
<p>Reflecting on 2024, the United Nations Office on Drugs and Crime (UNODC) collective action and shared commitment drove significant advancements in delivering accessible, ethical, and effective drug use disorder treatment and care around the globe. From scaling up treatment services to collaborating with health and justice sectors, these efforts have helped improve the lives of individuals, families, and communities as a whole.</p>
<p>Strengthening treatment and rehabilitation services is essential to ensure trauma-informed care and recovery programmes that not only support individuals with drug use disorders but also reduce their vulnerability to drug-related violence, crime and exploitation by traffickers.</p>
<p>Beyond being a healthcare issue, untreated drug use disorders fuel social instability, crime, drug trafficking, and economic strain. It is a contributing factor to homelessness, incarceration, and migration pressures in vulnerable regions, affecting global security and stability. Under the lead of UNODC’s Prevention, Treatment, and Rehabilitation Section (PTRS), the following milestones reflect a deepened global focus on person-centred drug use disorder treatment and recovery pathways, grounded in science and compassion.</p>
<p> </p>
</div></div>
   </div>
</div><div class="container mx-auto mt-0">

            <div class="image-container"><img src="/res/drug-prevention-and-treatment/news-and-events/2025/April/youth-forum-2025_-when-prevention-is-a-priority--resilience-becomes-a-reality_html/training_map.jpg" class="img-fluid" alt="" title=""></div>
         </div><div style="text-align: justify;">
<h2><strong>Global impact of our work </strong></h2>
<p>Overall, in 2024, more than 3,000 professionals from close to 60 countries were trained in 29 nations on the treatment of drug use disorders, and more than 50,000 people were reached by those trained professionals. This contributed towards strengthening effective drug use disorder treatment and care in participating countries.</p>
<p> </p>
<p> </p>
<h2><strong>Launch of the #ScaleUp initiative </strong></h2>
<p>One of the highlights in 2024, was the launch of the <a href="https://www.drugsandalcohol.ie/40516/1/UNODC_ScaleUp_stimulantTX.pdf">#ScaleUp initiative</a> at the 67th session of the Commission on Narcotic Drugs (CND) in March 2024. It calls upon Member States, to support research in identifying scalable and effective interventions for the treatment of stimulant use disorders to reduce the global treatment gap. The increasing use of stimulants including synthetic drugs and new psychoactive substances, potentially adulterated with potent opioids may increase the need for treatment and care of stimulant use disorders. </p>
<p>The initiative, supported by EUDA and WHO, aims at conducting a multi-country study on both psychosocial and pharmacological treatment of stimulant use disorder with a focus on feasibility, safety and effectiveness in different combinations and contexts. </p>

<p style="text-align: justify;">A briefing on #ScaleUp took place at the CND Reconvened Session in December 2024 to update UN Member States about the initiative and numerous countries from across the globe are expressing interest in supporting and implementing the #ScaleUp initiative. Recognising the importance of this initiative, the government of France is the first donor of the #ScaleUp Initiative.</p>

<h2 style="text-align: left;"><strong><strong>29 Member State pledges on treatment made at CND </strong><br /></strong></h2>
<p style="text-align: justify;">During the General Debate of the High-Level Segment of the CND 2024 Midterm review, 29 pledges were made by Member States and covered such topics as treatment and care for people with drug use disorders in contact with the criminal justice system as alternatives to conviction or punishment (ATI), quality assurance for the treatment of drug use disorders (QA), treatment of stimulant use disorders (#ScaleUp), overdose, and comorbidity. </p></div>
   </div>
</div><div class="container mx-auto mt-0">
   <div class=" row mb-2 mt-0">
      <div class="col-lg-12"><p style="text-align: justify;">Additionally, the <a href="https://www.unodc.org/documents/commissions/CND/Drug_Resolutions/2020-2029/2024/Res_67_1.pdf">CND resolution 67/1</a> on “Promoting recovery and related support services for people with drug use disorders” was adopted. It emphasizes the importance of evidence-based treatment, rehabilitation, and social reintegration while encouraging Member States to strengthen recovery-oriented policies.</p>
<p style="text-align: justify;"> </p>
<h2><strong><strong>Global efforts to improve treatment quality and data-driven decision-making </strong> </strong></h2>
<p style="text-align: justify;">One of the UNODC PTRS’s flagship initiatives, is the <a href="https://www.unodc.org/documents/QA_brochure_for_Paris_Pact_130722v1.pdf">Quality Assurance (QA) for Drug Use Disorder Treatment</a> initiative that aims to support Member States in reviewing national drug treatment systems and services in a participatory approach. Aligned with the <a href="https://www.unodc.org/documents/drug-prevention-and-treatment/UNODC-WHO_International_Standards_Treatment_Drug_Use_Disorders_April_2020.pdf">International Standards for the Treatment of Drug Use Disorders</a>, it aims to enhance recovery outcomes, reduce the risk of overdose and relapse, and ultimately create healthier, safer communities around the globe. The QA initiative contributes to public health improvements and broader social stability, which in turn reduces the factors driving illicit drug production and trafficking.</p>
<p style="text-align: justify;">To enhance quality assurance in drug use disorder treatment, UNODC trained over 870 professionals from ten countries in 2024 alone. </p></div>

<div style="text-align: justify;">In Africa, the first regional workshop on the Substance Use Disorder Facility Survey took place with five countries - Cameroon, Congo Brazzaville, Gabon, Central African Republic, and Chad. Additionally, in Kenya, UNODC mapped 13 facilities in Mombasa County in alignment with this survey.</div>
<div style="text-align: justify;">To assess global treatment quality and recovery support, UNODC published a <a href="https://www.unodc.org/documents/drug-prevention-and-treatment/UNODC_Review_Quality_Treatment.pdf">review</a> based on 2020–2021 Annual Report Questionnaire data, offering key insights under the International Standards for the Treatment of Drug Use Disorders. The findings highlight areas for improvement in drug treatment services worldwide.</div>
<div style="text-align: justify;">With the goal of further building a national data information system on drugs, the <a href="https://www.unodc.org/documents/drug-prevention-and-treatment/UNODC_Rapport_enquete_Guinee_18Dec2024.pdf">school survey report in Guinea</a> was published. Additionally, 130 professionals received training in data collection methodologies in 2024 around the globe.</div>

<h2><strong>Strengthening alternatives to conviction or punishment (ATI) in Kenya, Nigeria and Vietnam</strong></h2>
</div>
<p style="text-align: justify;">The United Nations Office on Drugs and Crime (UNODC) continues its efforts to enhance treatment and care for people with drug use disorders in contact with the criminal justice system through its additional flagship initiative on <a href="https://www.unodc.org/documents/drug-prevention-and-treatment/UNODC_WHO_Alternatives.pdf">Alternatives to Conviction or Punishment (ATI)</a>. Originally launched in 2016 in response to CND Resolution 58/5, ATI promotes non-custodial alternative measures for appropriate drug-related offences of a minor nature.</p>
<p style="text-align: justify;">In 2024 alone, UNODC’s Prevention, Treatment, and Rehabilitation Section (PTRS) trained more than 400 practitioners from Kenya and Nigeria to strengthen ATI implementation.</p>
<p style="text-align: justify;">In Kenya, national and local steering committees convened in Nairobi and Mombasa, while sensitization meetings engaged key stakeholders, including health authorities, prosecutors, probation officers, civil society organizations, and drug prevention agencies. In Nigeria, a technical working group in Kaduna State spearheaded ATI efforts, including a Case Care Management training, which equipped professionals with strategies to increase multisectoral partnerships to provide treatment for individuals with drug use disorders in contact with the criminal justice system. A magistrate court training also reinforced judicial understanding of drug use disorder treatment and care in the framework of ATI.</p>
<p style="text-align: justify;"> </p></div>

         </div><h2><strong>New e-learning modules scale up treatment education and intervention strategies worldwide </strong></h2>
<div style="text-align: justify;">In 2024, UNODC PTRS introduced three e-learning modules that mark a significant step toward scaling up education and intervention strategies on effective drug use disorder treatment and care around the globe.</div>
<div style="text-align: justify;">These modules cover Basic Counselling Skills, Treatment and Care as Alternatives to Conviction or Punishment for People in Contact with the Criminal Justice System (ATI), and An Introduction to Treatnet Family, offering participants a structured approach to these crucial topics.</div>
<div style="text-align: justify;">The initiative has already seen significant engagement. As of November 2024, the UNODC e-learning module on <a href="https://www.unodc.org/documents/drug-prevention-and-treatment/ATI_E-learning_brochure.pdf">Treatment and Care as Alternatives to Conviction or Punishment for People with Drug Use Disorders in Contact with the Criminal Justice System (ATI)</a> recorded 62 completions from eight different countries, while another module on <a href="https://www.unodc.org/documents/drug-prevention-and-treatment/UNODC_Basic_Counselling_Skills_elearning_brochure_v2.pdf">Basic Counselling Skills</a> surpassed 300 completions, with participants representing 45 countries—including courses available in Russian and Spanish. Additionally, the third module on <a href="https://www.unodc.org/documents/drug-prevention-and-treatment/Treatnet_E-learning_borchure.pdf">Introduction to Treatnet Family: Elements of Family Therapy for Adolescents with Substance Use Disorders</a> had 20 enrolments from 15 countries, further demonstrating the growing global interest in advancing expertise in effective drug use disorder treatment and care. Digital applications to support people with drug use disorders strengthen the workforce and contribute to better quality treatment.</div>

<h2><strong>Empowering policymakers and strengthening recovery support </strong></h2>
UNODC PTRS marked important contributions at the <a href="https://www.issup.net/national-chapters/issup-greece">International Society of Substance Use Professionals (ISSUP) Conference</a> in June 2024, Thessaloniki, Greece, an annual event for the global prevention, treatment and recovery support community. More specifically, UNODC PTRS organized a <a href="https://www.unodc.org/documents/drug-prevention-and-treatment/UPDATED_UNODC_Policymakers_Training_Package_2025.pdf">Policymakers Training</a> and a <a href="https://www.issup.net/training/universal-recovery-curriculum/urc-2-delivering-recovery-support-services-recovery-allies">Universal Recovery Curriculum (URC)</a> training and contributed to numerous high-level panel discussions.</div>
<div style="text-align: justify;">The <a href="https://www.unodc.org/documents/drug-prevention-and-treatment/UPDATED_UNODC_Policymakers_Training_Package_2025.pdf">Policymakers Training Package on the Nature, Prevention, and Treatment of Drug Use Disorders </a>focused on strengthening commitment to effective drug use disorder prevention and treatment, improving comprehensive care systems, and fostering collaborative networks among policymakers from around the globe. Guided by the <a href="https://www.unodc.org/documents/drug-prevention-and-treatment/UNODC-WHO_International_Standards_Treatment_Drug_Use_Disorders_April_2020.pdf">International Standards for the Treatment of Drug Use Disorders</a> and <a href="https://www.unodc.org/unodc/en/prevention/prevention-standards.html">Prevention of Drug Use Disorders</a>, participants discussed national priorities to enhance accessibility and effectiveness of drug use prevention and drug use disorder treatment services. To date, close to 2,000 policymakers have been trained on this tool, contributing to global drug treatment initiatives and reinforcing the importance of multisectoral collaboration in prevention and rehabilitation.</div>
<div style="text-align: justify;">The training on <a href="https://www.issup.net/training/universal-recovery-curriculum/urc-2-delivering-recovery-support-services-recovery-allies">Universal Recovery Curriculum (URC): Delivering Recovery Support Services: The Allies Link and Lend Inventive Engaging Support (ALLIES)</a>, equipped professionals with skills in trauma-informed care, self-care, and boundary setting to work effectively as recovery support professionals. Designed for those interested in recovery support services who do not identify as being in recovery themselves, the workshop aimed to increase the capacity of recovery ally professionals. Collaboration between law enforcement, social services, and healthcare providers was also identified as vital to building trust in the community and reduce negative attitudes towards people with drug use disorders which ultimately can lead to increased access to treatment and sustained recovery support. </div>

<h2><strong>Informal Scientific Network  (ISN) contributes towards effective global drug policies on substance use disorder treatment in prisons </strong></h2>
At the margins of the 67h Commission on Narcotic Drugs (CND), the <a href="https://www.unodc.org/documents/drug-prevention-and-treatment/2211068_ISN_Brochure.pdf">Informal Scientific Network (ISN)</a> brought together over 30 leading scientists to define <a href="https://www.unodc.org/documents/drug-prevention-and-treatment/2024_ISN_InformalScientificNetwork_Statement_140324-FINAL.pdf"><em>recommendations for the effective treatment of substance use disorders in prison settings</em></a><em>. </em>These were presented at the Plenary of the CND on 15 March 2024 to support UN Member States in developing and implementing effective services for the treatment of substance use disorders in prison settings, in line with international standards and regulations.</div>
<div style="text-align: justify;">The ISN outlined thirteen key recommendations, urging alternatives to conviction or punishment, improved clinical screening, and expanded treatment services for individuals with drug use disorders in prison settings. In addition, experts emphasized the need for specialized training for justice and healthcare professionals, systematic data collection, and adequate funding. Professor Seena Fazel, one of the guest speakers, noted, “It is of utmost importance for treatment resources to be allocated fairly to prison health and considered as an afterthought”.</div>
<div style="text-align: justify;">The ISN statement presented by the ISN Chair Dr Nora Volkow at CND Plenary also underscored the necessity of evidence-based solutions to reduce negative attitudes towards individuals with drug use disorders, enhance recovery outcomes and for UN Member States, to drive forward innovative, humane, and effective strategies for addressing substance use disorders in prison settings worldwide.</div>
<div style="text-align: justify;"> </div></div>

</div><div class="container mx-auto mt-0">
   <div class=" row">
      <div class="col-lg-12"><h2><strong>Outlook for 2025 </strong></h2>
